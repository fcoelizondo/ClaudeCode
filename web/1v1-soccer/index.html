<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>1v1 Soccer</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="1v1 Soccer">
<meta name="theme-color" content="#1c8a4a">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="icon" href="icon.svg">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
  <canvas id="game"></canvas>

  <div id="hud">
    <div id="timer">1:30</div>
    <div id="score"><span id="score-left">0</span><span class="dash">-</span><span id="score-right">0</span></div>
  </div>

  <div id="start-overlay" class="overlay">
    <div class="panel">
      <h1>1V1 SOCCER</h1>
      <p>Score more goals than the CPU in 90 seconds.</p>
      <div id="roster" class="roster"></div>
      <div id="stats-line" class="stats-line"></div>
      <p>Pick your difficulty to play:</p>
      <div class="mode-buttons">
        <button id="diff-easy" class="btn">EASY</button>
        <button id="diff-medium" class="btn btn-medium">MEDIUM</button>
        <button id="diff-hard" class="btn btn-hard">HARD</button>
      </div>
      <div class="controls-help">
        <div><strong>Keyboard</strong> A/D or ←/→ move · W/↑ jump · S/↓/Space kick</div>
        <div><strong>Touch</strong> left thumb moves · right thumb jumps &amp; kicks</div>
      </div>
    </div>
  </div>

  <div id="goal-banner" class="banner hidden">GOAL!</div>

  <div id="fulltime-overlay" class="overlay hidden">
    <div class="panel">
      <h1 id="fulltime-title">FULL TIME</h1>
      <p id="fulltime-score">0 - 0</p>
      <p id="unlock-note" class="unlock-note hidden"></p>
      <div class="mode-buttons">
        <button id="restart-btn" class="btn">PLAY AGAIN</button>
        <button id="menu-btn" class="btn btn-ghost">CHANGE LEVEL</button>
      </div>
    </div>
  </div>

  <div class="touch-controls">
    <div class="pad pad-left">
      <button class="pad-btn move-btn" data-action="p1-left">◀</button>
      <button class="pad-btn move-btn" data-action="p1-right">▶</button>
    </div>
    <div class="pad pad-right">
      <button class="pad-btn jump-btn" data-action="p1-jump">▲<span>JUMP</span></button>
      <button class="pad-btn kick-btn" data-action="p1-kick">⚽<span>KICK</span></button>
    </div>
  </div>

  <div id="rotate-overlay">
    <div class="rotate-icon">📱</div>
    <p>Rotate your device to play — 1v1 Soccer is a landscape game.</p>
  </div>
</div>

<script src="game.js"></script>
</body>
</html>
