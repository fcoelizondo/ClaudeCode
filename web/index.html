<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Games &amp; Pages</title>
<style>
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    min-height: 100%;
    background: #14181c;
    color: #fff;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  }
  main {
    max-width: 640px;
    margin: 0 auto;
    padding: 48px 24px;
  }
  h1 {
    font-size: 28px;
    margin: 0 0 24px;
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 16px;
  }
  a.game-card {
    display: block;
    text-decoration: none;
    color: inherit;
    background: #1f2530;
    border-radius: 16px;
    padding: 20px;
    text-align: center;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  a.game-card:active {
    transform: scale(0.97);
    background: #262d3a;
  }
  .game-card .icon {
    width: 64px;
    height: 64px;
    margin: 0 auto 12px;
    display: block;
    border-radius: 14px;
  }
  .game-card .name {
    font-weight: 600;
    font-size: 15px;
  }
</style>
</head>
<body>
<main>
  <h1>Games &amp; Pages</h1>
  <div class="grid">
    <a class="game-card" href="crossy-road/">
      <img class="icon" src="crossy-road/icon.svg" alt="">
      <div class="name">Crossy Road</div>
    </a>
    <a class="game-card" href="impostor/">
      <img class="icon" src="impostor/icon.svg" alt="">
      <div class="name">Impostor</div>
    </a>
    <a class="game-card" href="mafia/">
      <img class="icon" src="mafia/icon.svg" alt="">
      <div class="name">Mafia</div>
    </a>
    <a class="game-card" href="sky-roo/">
      <img class="icon" src="sky-roo/icon.svg" alt="">
      <div class="name">Sky Roo</div>
    </a>
    <a class="game-card" href="1v1-soccer/">
      <img class="icon" src="1v1-soccer/icon.svg" alt="">
      <div class="name">1v1 Soccer</div>
    </a>
    <a class="game-card" href="pecan-and-spice/">
      <img class="icon" src="pecan-and-spice/icon.svg" alt="">
      <div class="name">Pecan &amp; Spice</div>
    </a>
  </div>
</main>
</body>
</html>
